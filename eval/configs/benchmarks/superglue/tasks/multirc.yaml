benchmark: superglue
task: multirc
status: ranked
task_type: grouped_binary_classification
languages:
  available: [sr]
  ranked: [sr]
  roadmap: [hr, cnr, bs]
dataset:
  source_type: huggingface
  public_repo: permitt/superglue-serbian
  private_repo: permitt/superglue-private
  config: multirc
  splits:
    public: [train, validation, test]
    labeled_public: [train, validation]
    labeled_private: [test]
inputs:
  fields: [paragraph, question, answer]
  id_field: example_id
  group_fields: [paragraph_id, question_id]
metrics:
  primary: [f1_a]
  report: [f1_a, exact_match]
  task_score: f1_a
prompts:
  sr:
    template_id: multirc_sr_v1
tokenizer:
  max_length: 512
  padding: longest
  truncation: true
training:
  learning_rate: 2.0e-5
  batch_size: 16
  num_epochs: 5
  warmup_ratio: 0.1
  weight_decay: 0.01
  early_stopping_patience: 3
  metric_for_best_model: f1_a
