name: xlm_r_bertic
hf_repo: classla/xlm-r-bertic
family: xlm-roberta
params_hint: 560M
tier: official
training:
  learning_rate: 2.0e-5
  batch_size: 16
  num_epochs: 10
  fp16: true
task_overrides:
  # 560M XLM-R + multiple_choice on L4 24GB needs the smaller batch to
  # leave headroom for the per-seed allocator pressure that wedged earlier
  # COPA runs. fp16 also forced off here to rule out half-precision NaN/
  # overflow as the cause of the silent training hang we kept hitting.
  superglue.copa:
    batch_size: 8
    fp16: false
    num_epochs: 10
seeds: [42, 43, 44, 45, 46]
