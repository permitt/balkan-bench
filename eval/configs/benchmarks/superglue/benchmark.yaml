benchmark: superglue
version: 0.1.0
description: "SuperGLUE benchmark adapted for BCMS languages (sr/hr/mne for v0.1)."
license: CC-BY-4.0
maintainers:
  - name: Mitar Perović, Teodora Mihajlov
    github: permitt
    email: perovicmitar@gmail.com
citation: "Wang et al. 2019 (SuperGLUE); BalkanBench adaptation 2026."
paper: https://arxiv.org/abs/1905.00537
homepage: https://balkanbench.com
tasks:
  ranked: [boolq, cb, copa, rte, multirc, wsc]
