name: Bug report
description: Report a bug in the eval framework, CLI, schemas, or frontend.
title: "[bug] <short description>"
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include error messages or unexpected behaviour.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce
      description: Minimal steps. Include the exact balkanbench CLI invocation if applicable.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `balkanbench --version` (or the git SHA).
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, GPU, torch version.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
