benchmark: superglue
task: copa
status: ranked
task_type: multiple_choice
num_choices: 2
languages:
  available: [sr, hr, mne]
  ranked: [sr, hr, mne]
  roadmap: [bs]
dataset:
  source_type: huggingface
  config: copa
  per_language:
    sr:
      public_repo: permitt/superglue-sr
      private_repo: permitt/superglue-sr-private
    hr:
      public_repo: permitt/superglue-hr
      private_repo: permitt/superglue-hr-private
    mne:
      public_repo: permitt/superglue-mne
      private_repo: permitt/superglue-mne-private
  splits:
    public: [train, validation, test]
    labeled_public: [train, validation]
    labeled_private: [test]
inputs:
  fields: [premise, choice1, choice2, question]
  id_field: idx
metrics:
  primary: [accuracy]
  report: [accuracy]
  task_score: accuracy
prompts:
  sr:
    template_id: copa_sr_v1
    cause_prompt: "{premise} Šta je bio uzrok?"
    effect_prompt: "{premise} Šta se desilo kao rezultat?"
  hr:
    template_id: copa_hr_v1
    cause_prompt: "{premise} Što je bio uzrok?"
    effect_prompt: "{premise} Što se dogodilo kao rezultat?"
  mne:
    template_id: copa_mne_v1
    cause_prompt: "{premise} Što je bio uzrok?"
    effect_prompt: "{premise} Što se desilo kao rezultat?"
tokenizer:
  max_length: 128
  padding: longest
  truncation: true
training:
  learning_rate: 2.0e-5
  batch_size: 16
  num_epochs: 30
  warmup_ratio: 0.1
  weight_decay: 0.01
  early_stopping_patience: 10
  metric_for_best_model: accuracy
